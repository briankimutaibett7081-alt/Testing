<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCash - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .logo {
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 32px;
            color: #006b3a;
            font-weight: 700;
        }

        .phone-input {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            display: flex;
            background: white;
        }

        .country-code {
            background: #f5f5f5;
            padding: 15px;
            font-weight: 500;
            border-right: 1px solid #ddd;
        }

        .phone-input input {
            flex: 1;
            padding: 15px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }

        input:focus {
            border-color: #006b3a;
        }

        .login-btn {
            width: 100%;
            background: #006b3a;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .help-buttons {
            display: flex;
            gap: 15px;
        }

        .help-btn {
            flex: 1;
            background: #f5f5f5;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .version {
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>EcoCash</h1>
        </div>
        
        <div class="phone-input">
            <span class="country-code">+263</span>
            <input type="tel" id="phone" placeholder="Enter your phone number">
        </div>
        
        <input type="password" id="pin" maxlength="4" placeholder="Enter your PIN">
        
        <button class="login-btn" onclick="login()">Login</button>
        
        <div class="help-buttons">
            <button class="help-btn" onclick="register()">Register</button>
            <button class="help-btn" onclick="help()">Help & Support</button>
        </div>
        
        <div class="version">v4.0.1P</div>
    </div>

    <script>
        function login() {
            const phone = document.getElementById('phone').value;
            const pin = document.getElementById('pin').value;
            
            if(!phone || !pin) {
                alert('Please enter your phone number and PIN');
                return;
            }
            
            if(pin.length !== 4) {
                alert('PIN must be 4 digits');
                return;
            }
            
            localStorage.setItem('userPhone', '+263' + phone);
            window.location.href = 'loan-quote.html';
        }
        
        function register() {
            alert('To register an EcoCash wallet, please visit your nearest EcoCash agent.');
        }
        
        function help() {
            alert('EcoCash Support: Dial 114 from your Econet line');
        }
    </script>
</body>
</html>
